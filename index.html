<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic · Nejd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;
  --fg:#fff;
  --mute-1:rgba(255,255,255,.72);
  --mute-2:rgba(255,255,255,.52);
  --mute-3:rgba(255,255,255,.32);
  --mute-4:rgba(255,255,255,.16);
  --mute-5:rgba(255,255,255,.08);
  --mute-6:rgba(255,255,255,.04);
  --r:2px;
  --r-lg:4px;
  --gap:24px;
  --max:880px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--fg);min-height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-feature-settings:"ss01","cv11";
  font-size:15px;
  line-height:1.5;
  letter-spacing:-.01em;
  font-weight:400;
}
body::selection,*::selection{background:#fff;color:#000}

/* ── LAYOUT ── */
.container{max-width:var(--max);margin:0 auto;padding:32px 24px 80px}
.screen{display:none;animation:fadeIn .25s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── NAV ── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:48px;
  border-bottom:1px solid var(--mute-4);
  margin-bottom:48px;
}
.brand{
  font-weight:700;font-size:14px;
  letter-spacing:.18em;text-transform:uppercase;
}
.brand span{color:var(--mute-2);font-weight:400}
.nav-stats{font-size:12px;color:var(--mute-2);letter-spacing:.08em;text-transform:uppercase}

/* ── HERO ── */
.hero{margin-bottom:64px}
.hero h1{
  font-size:clamp(40px,7vw,72px);
  font-weight:300;
  line-height:1;
  letter-spacing:-.04em;
  margin-bottom:20px;
}
.hero h1 b{font-weight:700}
.hero p{
  font-size:16px;color:var(--mute-1);
  max-width:520px;line-height:1.55;
}

/* ── SECTION ── */
.section{margin-bottom:48px}
.section-title{
  font-size:11px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--mute-2);
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:1px solid var(--mute-4);
  display:flex;align-items:center;justify-content:space-between;
}
.section-title .num{
  font-family:'Inter',monospace;
  font-feature-settings:"tnum";
  font-weight:400;color:var(--mute-3);
}

/* ── SETTINGS ── */
.settings{display:grid;grid-template-columns:1fr;gap:24px}
.field{}
.field-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.field-label{font-size:13px;font-weight:500}
.field-hint{font-size:12px;color:var(--mute-3)}

.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{
  padding:9px 16px;
  border:1px solid var(--mute-4);
  background:transparent;color:var(--fg);
  font:inherit;font-size:13px;font-weight:500;
  letter-spacing:.02em;
  cursor:pointer;border-radius:var(--r);
  transition:border-color .15s,background .15s,color .15s;
  font-feature-settings:"tnum";
}
.pill:hover{border-color:var(--mute-2)}
.pill.on{
  background:var(--fg);color:#000;border-color:var(--fg);
  font-weight:600;
}

/* ── TOGGLE ── */
.toggle{
  width:42px;height:24px;border:1px solid var(--mute-4);
  border-radius:24px;position:relative;cursor:pointer;
  transition:border-color .15s,background .15s;
  flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;
  width:14px;height:14px;background:var(--fg);
  border-radius:50%;top:4px;left:4px;
  transition:left .2s,background .15s;
}
.toggle.on{background:var(--fg);border-color:var(--fg)}
.toggle.on::after{left:23px;background:#000}

.timer-block{margin-top:14px;display:none}
.timer-block.show{display:block}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:16px 24px;
  font:inherit;font-size:14px;font-weight:600;
  letter-spacing:.02em;
  border:1px solid var(--fg);
  border-radius:var(--r);
  cursor:pointer;
  transition:opacity .15s,transform .1s,background .15s,color .15s;
  background:var(--fg);color:#000;
  width:100%;
}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.99)}
.btn.ghost{background:transparent;color:var(--fg);border-color:var(--mute-4)}
.btn.ghost:hover{border-color:var(--fg);background:var(--mute-6)}
.btn.sm{padding:11px 18px;font-size:13px;width:auto}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}

/* arrow icon inside button */
.btn .ico{width:16px;height:16px;stroke-width:2}

/* ── TOPICS ── */
.topics{display:grid;grid-template-columns:1fr;gap:0;border-top:1px solid var(--mute-4)}
.topic{
  display:flex;align-items:center;gap:20px;
  padding:20px 4px;
  border-bottom:1px solid var(--mute-4);
  cursor:pointer;
  transition:background .15s,padding-left .2s;
  position:relative;
}
.topic:hover{background:var(--mute-6);padding-left:14px}
.topic-ico{
  width:40px;height:40px;flex-shrink:0;
  border:1px solid var(--mute-4);
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s;
}
.topic:hover .topic-ico{border-color:var(--fg)}
.topic-ico svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:1.5}
.topic-body{flex:1;min-width:0}
.topic-ru{
  font-size:15px;font-weight:600;
  margin-bottom:2px;letter-spacing:-.005em;
}
.topic-ar{
  font-family:'Amiri',serif;font-size:13px;
  color:var(--mute-2);direction:rtl;text-align:left;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.topic-count{
  font-size:11px;font-weight:500;color:var(--mute-2);
  letter-spacing:.08em;flex-shrink:0;
  font-feature-settings:"tnum";
  border:1px solid var(--mute-4);
  padding:4px 9px;border-radius:var(--r);
  min-width:42px;text-align:center;
}
.topic-arrow{
  flex-shrink:0;color:var(--mute-3);
  transition:color .15s,transform .2s;
}
.topic:hover .topic-arrow{color:var(--fg);transform:translateX(2px)}

/* ── FOOTER LINK ── */
.foot-link{
  margin-top:64px;padding-top:32px;
  border-top:1px solid var(--mute-4);
  display:flex;align-items:center;gap:14px;
  text-decoration:none;color:var(--fg);
  transition:opacity .15s;
}
.foot-link:hover{opacity:.7}
.foot-link svg{width:16px;height:16px;stroke:var(--fg);fill:none;stroke-width:1.5;flex-shrink:0}
.foot-link-body{flex:1;min-width:0}
.foot-link-title{font-size:13px;font-weight:600;letter-spacing:.02em}
.foot-link-sub{font-size:12px;color:var(--mute-2);margin-top:2px}

/* ══════════ QUIZ SCREEN ══════════ */
.quiz-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.icon-btn{
  background:none;border:1px solid var(--mute-4);
  width:36px;height:36px;border-radius:var(--r);
  cursor:pointer;color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,background .15s;
}
.icon-btn:hover{border-color:var(--fg);background:var(--mute-6)}
.icon-btn svg{width:14px;height:14px;stroke:var(--fg);fill:none;stroke-width:2}
.quiz-meta{display:flex;align-items:center;gap:16px}
.quiz-counter{
  font-size:12px;color:var(--mute-2);
  font-feature-settings:"tnum";letter-spacing:.06em;
}
.quiz-score{
  font-size:12px;font-weight:600;
  font-feature-settings:"tnum";letter-spacing:.06em;
  display:flex;align-items:center;gap:6px;
}
.quiz-score::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--fg);
}

/* progress + timer */
.bar-wrap{height:1px;background:var(--mute-4);overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;background:var(--fg);transition:width .3s ease;width:0%}
.tbar-wrap{height:1px;background:var(--mute-4);overflow:hidden;margin-bottom:48px}
.tbar-fill{height:100%;background:var(--fg);width:0%;transition:opacity .3s}

/* topic + arabic word */
.q-topic{
  text-align:center;font-size:11px;
  color:var(--mute-2);letter-spacing:.18em;
  text-transform:uppercase;margin-bottom:24px;
}
.q-word{
  text-align:center;
  font-family:'Amiri',serif;
  font-size:clamp(56px,10vw,96px);
  font-weight:700;direction:rtl;
  line-height:1.3;min-height:120px;
  margin-bottom:48px;word-break:break-word;
}

/* answers */
.answers{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-bottom:16px;
}
.ans{
  padding:22px 14px;
  border:1px solid var(--mute-4);
  background:transparent;color:var(--fg);
  font:inherit;font-size:14px;font-weight:500;
  letter-spacing:-.005em;
  text-align:center;line-height:1.4;cursor:pointer;
  min-height:80px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--r);
  transition:border-color .15s,background .15s,color .15s,opacity .2s;
}
.ans:hover{border-color:var(--mute-2)}
.ans.ok{
  background:var(--fg);color:#000;border-color:var(--fg);
  font-weight:700;
}
.ans.bad{
  border-color:var(--fg);
  text-decoration:line-through;
  text-decoration-thickness:1px;
  color:var(--mute-2);
}
.ans.dim{opacity:.22;pointer-events:none}

/* skip + next */
.btn-skip{
  width:100%;padding:14px;
  border:1px solid var(--mute-4);background:transparent;
  color:var(--mute-2);font:inherit;font-size:13px;font-weight:500;
  letter-spacing:.02em;cursor:pointer;border-radius:var(--r);
  transition:color .15s,border-color .15s;
}
.btn-skip:hover{color:var(--fg);border-color:var(--mute-2)}

/* ══════════ RESULTS SCREEN ══════════ */
.res{padding:48px 0 24px;text-align:center}
.res-pct{
  font-size:clamp(96px,16vw,160px);
  font-weight:200;line-height:1;
  letter-spacing:-.05em;
  margin-bottom:8px;
}
.res-pct .pct-sym{color:var(--mute-3);font-size:.5em;margin-left:.05em;font-weight:300}
.res-line{
  font-size:14px;color:var(--mute-2);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:8px;font-feature-settings:"tnum";
}
.res-msg{
  font-size:18px;font-weight:500;
  margin:32px auto 48px;max-width:420px;
}

@media (min-width:640px){
  .answers{grid-template-columns:1fr 1fr 1fr 1fr}
  .ans{min-height:90px}
}
</style>
</head>
<body>
<div class="container">

<!-- ════════════════ HOME ════════════════ -->
<section id="screen-home" class="screen active">

  <header class="nav">
    <div class="brand">Arabic <span>·</span> Nejd</div>
    <div class="nav-stats" id="nav-stats">— · —</div>
  </header>

  <div class="hero">
    <h1>Учим арабский<br><b>словами</b>.</h1>
    <p>Минималистичный квиз для запоминания лексики. Темы — Кысасу ан-Набиййин, Акыда, Байна Ядайк.</p>
  </div>

  <div class="section">
    <div class="section-title">Параметры <span class="num">01</span></div>
    <div class="settings">

      <div class="field">
        <div class="field-head">
          <span class="field-label">Количество слов</span>
          <span class="field-hint" id="count-hint">20 слов</span>
        </div>
        <div class="pills" id="count-pills">
          <button class="pill"    data-v="10"   onclick="setCount(this)">10</button>
          <button class="pill on" data-v="20"   onclick="setCount(this)">20</button>
          <button class="pill"    data-v="30"   onclick="setCount(this)">30</button>
          <button class="pill"    data-v="50"   onclick="setCount(this)">50</button>
          <button class="pill"    data-v="9999" onclick="setCount(this)">Все</button>
        </div>
      </div>

      <div class="field">
        <div class="field-head">
          <span class="field-label">Таймер на ответ</span>
          <div class="toggle" id="tmr-toggle" onclick="toggleTimer()" role="switch" aria-checked="false"></div>
        </div>
        <div id="tmr-opts" class="timer-block">
          <div class="pills" id="timer-pills">
            <button class="pill"    data-v="5"  onclick="setTimerSec(this)">5 сек</button>
            <button class="pill on" data-v="10" onclick="setTimerSec(this)">10 сек</button>
            <button class="pill"    data-v="15" onclick="setTimerSec(this)">15 сек</button>
            <button class="pill"    data-v="20" onclick="setTimerSec(this)">20 сек</button>
            <button class="pill"    data-v="30" onclick="setTimerSec(this)">30 сек</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <div class="section-title">Викторина <span class="num">02</span></div>
    <button class="btn" onclick="startAll()">
      Начать со всеми словами
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <div class="section">
    <div class="section-title">Темы <span class="num" id="topics-count">04</span></div>
    <div class="topics" id="topics-list"></div>
  </div>

  <a href="https://t.me/peqaso" target="_blank" rel="noopener" class="foot-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square">
      <path d="M21.5 4.5 2.5 12.5l7 2 2 7 10-17z"/>
      <path d="M9.5 14.5l4-4"/>
    </svg>
    <div class="foot-link-body">
      <div class="foot-link-title">@peqaso</div>
      <div class="foot-link-sub">Нашли ошибку — заскриньте и напишите.</div>
    </div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square" style="opacity:.5">
      <path d="M9 6l6 6-6 6"/>
    </svg>
  </a>

</section>

<!-- ════════════════ QUIZ ════════════════ -->
<section id="screen-quiz" class="screen">
  <div class="quiz-head">
    <button class="icon-btn" onclick="goHome()" aria-label="Закрыть">
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div class="quiz-meta">
      <div class="quiz-counter" id="q-num">1 / 20</div>
      <div class="quiz-score" id="q-score">0</div>
    </div>
  </div>

  <div class="bar-wrap"><div class="bar-fill"  id="q-prog"></div></div>
  <div class="tbar-wrap"><div class="tbar-fill" id="q-tbar"></div></div>

  <div class="q-topic" id="q-topic"></div>
  <div class="q-word"  id="q-word"></div>

  <div class="answers" id="q-answers"></div>
  <button class="btn-skip" id="btn-skip" onclick="skipQ()">Пропустить</button>
  <button class="btn" id="btn-next" onclick="nextQ()" style="display:none;margin-top:8px">
    Следующее
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square">
      <path d="M5 12h14M13 5l7 7-7 7"/>
    </svg>
  </button>
</section>

<!-- ════════════════ RESULTS ════════════════ -->
<section id="screen-results" class="screen">
  <div class="quiz-head">
    <button class="icon-btn" onclick="goHome()" aria-label="Закрыть">
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div class="quiz-meta">
      <div class="quiz-counter">Результат</div>
    </div>
  </div>

  <div class="res">
    <div class="res-pct"><span id="r-pct">0</span><span class="pct-sym">%</span></div>
    <div class="res-line"><span id="r-score">0</span> из <span id="r-of">0</span> верно</div>
    <div class="res-msg" id="r-msg"></div>
    <div class="btn-row">
      <button class="btn ghost" onclick="goHome()">На главную</button>
      <button class="btn" onclick="retry()">
        Ещё раз
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="square">
          <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>
        </svg>
      </button>
    </div>
  </div>
</section>

</div>

  { arabic:"قِرَاءَة",        russian:"чтение",                topic:"بين يديك 2" },
  { arabic:"سَفَر",           russian:"путешествие",           topic:"بين يديك 2" },
  { arabic:"مُرَاسَلَة",      russian:"переписка",             topic:"بين يديك 2" },
  { arabic:"رِيَاضَة",        russian:"спорт",                 topic:"بين يديك 2" },
  { arabic:"رِحْلَة",         russian:"поездка, экскурсия",    topic:"بين يديك 2" },
  { arabic:"مَجَلَّة",        russian:"журнал",                topic:"بين يديك 2" },
  { arabic:"كِتَاب",          russian:"книга",                 topic:"بين يديك 2" },
  { arabic:"مَكْتَبَة",       russian:"библиотека",            topic:"بين يديك 2" },
  { arabic:"مُفِيد",          russian:"полезный",              topic:"بين يديك 2" },
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const cfg = { count: 20, timer: false, timerSec: 10 };
const qz  = { words:[], idx:0, score:0, answered:false, rafId:null, lastTopic:null, autoNextId:null };

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.getElementById('nav-stats').textContent = `${WORDS.length} слов · ${TOPICS.length} тем`;
document.getElementById('topics-count').textContent = String(TOPICS.length).padStart(2,'0');
buildFolders();

function buildFolders(){
  const cnt = {};
  WORDS.forEach(w => { cnt[w.topic] = (cnt[w.topic] || 0) + 1; });
  const wrap = document.getElementById('topics-list');
  TOPICS.forEach(t => {
    const n = cnt[t.ar] || 0;
    if (!n) return;
    const el = document.createElement('div');
    el.className = 'topic';
    el.onclick = () => startTopic(t.ar);
    el.innerHTML = `
      <div class="topic-ico">${TOPIC_ICONS[t.icon]}</div>
      <div class="topic-body">
        <div class="topic-ru">${t.ru}</div>
        <div class="topic-ar">${t.ar}</div>
      </div>
      <div class="topic-count">${n}</div>
      <svg class="topic-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M9 6l6 6-6 6"/></svg>`;
    wrap.appendChild(el);
  });
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function setCount(btn){
  document.querySelectorAll('#count-pills .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  cfg.count = parseInt(btn.dataset.v);
  const hint = document.getElementById('count-hint');
  hint.textContent = cfg.count >= 9999 ? `${WORDS.length} слов` : `${cfg.count} слов`;
}
function toggleTimer(){
  cfg.timer = !cfg.timer;
  const t = document.getElementById('tmr-toggle');
  t.classList.toggle('on', cfg.timer);
  t.setAttribute('aria-checked', cfg.timer);
  document.getElementById('tmr-opts').classList.toggle('show', cfg.timer);
}
function setTimerSec(btn){
  document.querySelectorAll('#timer-pills .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  cfg.timerSec = parseInt(btn.dataset.v);
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){ stopTimer(); showScreen('home'); }

// ══════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════
function startAll(){
  qz.lastTopic = null;
  const n = cfg.count >= 9999 ? WORDS.length : cfg.count;
  beginQuiz(shuffle([...WORDS]).slice(0, n));
}
function startTopic(ar){
  qz.lastTopic = ar;
  const pool = shuffle(WORDS.filter(w => w.topic === ar));
  const n    = cfg.count >= 9999 ? pool.length : Math.min(cfg.count, pool.length);
  beginQuiz(pool.slice(0, n));
}
function beginQuiz(words){
  Object.assign(qz, { words, idx:0, score:0, answered:false });
  showScreen('quiz');
  renderQ();
}

function renderQ(){
  stopTimer();
  qz.answered = false;
  const w = qz.words[qz.idx], total = qz.words.length;

  document.getElementById('q-num').textContent   = `${qz.idx + 1} / ${total}`;
  document.getElementById('q-score').textContent = `${qz.score}`;
  document.getElementById('q-prog').style.width  = `${((qz.idx) / total) * 100}%`;
  document.getElementById('q-topic').textContent = topicLabel(w.topic);
  document.getElementById('q-word').textContent  = w.arabic;
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'block';

  const grid = document.getElementById('q-answers');
  grid.innerHTML = '';
  makeOpts(w).forEach(o => {
    const b = document.createElement('button');
    b.className   = 'ans';
    b.textContent = o.ru;
    b.onclick     = () => pick(b, o, w);
    grid.appendChild(b);
  });

  const tf = document.getElementById('q-tbar');
  tf.style.width = cfg.timer ? '100%' : '0%';
  tf.style.opacity = '1';

  if (cfg.timer) startTimer(cfg.timerSec, () => timeUp(w));
}

function topicLabel(ar){
  const t = TOPICS.find(t => t.ar === ar);
  return t ? t.ru : ar;
}

function makeOpts(correct){
  const used = new Set([correct.russian]);
  const wrong = [];
  for (const w of shuffle(WORDS.filter(w => w.arabic !== correct.arabic))){
    if (!used.has(w.russian)) { used.add(w.russian); wrong.push({ ru: w.russian, ok: false }); }
    if (wrong.length === 3) break;
  }
  return shuffle([...wrong, { ru: correct.russian, ok: true }]);
}

function pick(btn, opt, correct){
  if (qz.answered) return;
  qz.answered = true;
  stopTimer();
  document.getElementById('btn-skip').style.display = 'none';
  document.querySelectorAll('.ans').forEach(b => b.classList.add('dim'));
  btn.classList.remove('dim');
  if (opt.ok){
    btn.classList.add('ok');
    qz.score++;
    document.getElementById('q-score').textContent = `${qz.score}`;
    qz.autoNextId = setTimeout(nextQ, 1800);
  } else {
    btn.classList.add('bad');
    document.querySelectorAll('.ans').forEach(b => {
      if (b.textContent === correct.russian){ b.classList.remove('dim'); b.classList.add('ok'); }
    });
  }
  document.getElementById('btn-next').style.display = 'flex';
}

function timeUp(correct){
  if (qz.answered) return;
  qz.answered = true;
  document.getElementById('btn-skip').style.display = 'none';
  document.querySelectorAll('.ans').forEach(b => {
    b.classList.add('dim');
    if (b.textContent === correct.russian){ b.classList.remove('dim'); b.classList.add('ok'); }
  });
  setTimeout(nextQ, 1400);
}

function skipQ(){
  if (qz.answered) return;
  qz.answered = true;
  stopTimer();
  document.getElementById('btn-skip').style.display = 'none';
  document.querySelectorAll('.ans').forEach(b => b.classList.add('dim'));
  document.getElementById('btn-next').style.display = 'flex';
}

function nextQ(){
  clearTimeout(qz.autoNextId);
  qz.idx++;
  qz.idx >= qz.words.length ? showResults() : renderQ();
}

function showResults(){
  const total = qz.words.length, pct = Math.round((qz.score / total) * 100);
  const msg =
    pct >= 90 ? 'Превосходно. Так держать.' :
    pct >= 70 ? 'Хорошая работа.' :
    pct >= 50 ? 'Неплохо. Практикуйся ещё.' :
                'Не сдавайся, продолжай.';
  document.getElementById('r-pct').textContent   = pct;
  document.getElementById('r-score').textContent = qz.score;
  document.getElementById('r-of').textContent    = total;
  document.getElementById('r-msg').textContent   = msg;
  showScreen('results');
}

function retry(){ qz.lastTopic ? startTopic(qz.lastTopic) : startAll(); }

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer(sec, onExpire){
  const tf = document.getElementById('q-tbar');
  const t0 = performance.now();
  const ms = sec * 1000;
  function tick(now){
    const elapsed = now - t0;
    const pct = Math.max(0, 1 - elapsed / ms);
    tf.style.width = (pct * 100) + '%';
    tf.style.opacity = (.4 + pct * .6).toFixed(2);
    if (pct <= 0){ onExpire(); return; }
    qz.rafId = requestAnimationFrame(tick);
  }
  qz.rafId = requestAnimationFrame(tick);
}
function stopTimer(){
  cancelAnimationFrame(qz.rafId);
  qz.rafId = null;
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function shuffle(a){
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
</script>
